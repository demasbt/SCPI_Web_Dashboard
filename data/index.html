<!DOCTYPE HTML><html>
<head>
  <title>SCPI Dashboard</title>
</head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <style>
    html {font-family: Arial; display: inline-block; text-align: center;}
    h2 {font-size: 3.0rem;}
    p {font-size: 3.0rem;}
    body {background-color: powderblue; max-width: 600px; margin:0px auto; padding-bottom: 25px;}
    /* Customize the label (the container) */
    .container {display: block; position: relative; padding-left: 35px; margin-bottom: 12px; cursor: pointer; font-size: 22px; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;}
    /* Hide the browser's default checkbox */
    .container input {position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0;}
    /* Create a custom checkbox */
    .checkmark {position: absolute; top: 0; left: 0; height: 25px; width: 25px; background-color: #eee; border-radius: 50%;}
    /* On mouse-over, add a grey background color */
    .container:hover input ~ .checkmark {background-color: #ccc;}
    /* When the checkbox is checked, add a blue background */
    .container input:checked ~ .checkmark {background-color: #2196F3;}
    /* Create the checkmark/indicator (hidden when not checked) */
    .checkmark:after {content: ""; position: absolute; display: none;}
    /* Show the checkmark when checked */
    .container input:checked ~ .checkmark:after {display: block;}
    /* Style the checkmark/indicator */
    .container .checkmark:after {left: 9px; top: 9px; width: 8px; height: 8px; border-radius: 50%; background: white}
  </style>
<body>
  <h2>SCPI Dashboard</h2>
  <form action="/get" method="post">
  <label class="container">Bode Plot
    <input type="radio" name="scpi_opt" value="bode_plot" checked>
    <span class="checkmark"></span>
  </label>
  <label class="container">Frequency Average
    <input type="radio" name="scpi_opt" value="freq_avg">
    <span class="checkmark"></span>
  </label>
  <label class="container">VPP
    <input type="radio" name="scpi_opt" value="vpp_avg">
    <span class="checkmark"></span>
  </label>
  <label class="container"> GET ID DEVICE
    <input type="radio" name="scpi_opt" value="id_device">
    <span class="checkmark"></span>
  </label>
  #Sample: <input type="number" name="sample_num">
  <input type="submit" value="Start">
  </form>
</body>
</html>
